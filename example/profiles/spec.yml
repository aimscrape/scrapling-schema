fields:
  profiles:
    css: ".profile"
    type: "array<object>"
    fields:
      name:
        css: "h2"
        type: "string"
      age:
        css: ".age"
        type: "integer"
        defaultValue: 0
      skills:
        css: ".skills"
        type: "array<string>"
        transform: [{ split: "," }]
      url:
        css: "a"
        type: "string"
        attr: "href"
