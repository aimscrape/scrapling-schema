name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository: pypi or testpypi"
        required: true
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi') && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches pyproject version
        env:
          REF: ${{ github.ref }}
          TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path
          import tomllib

          ref = os.environ["REF"]
          tag = os.environ["TAG"]

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          expected_tag = f"v{version}"

          if not ref.startswith("refs/tags/"):
              print("Ref must be a tag to publish.")
              print(f"Current ref: {ref}")
              print(f"Expected tag: {expected_tag}")
              print("Tip: select a tag (e.g. vX.Y.Z) as the ref when running workflow_dispatch.")
              sys.exit(1)

          if tag != expected_tag:
              print(f"Tag {tag!r} does not match expected {expected_tag!r} from pyproject.toml.")
              sys.exit(1)

          print(f"Version OK: {version} (tag {tag})")
          PY

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
          python -m pip install -U build

      - name: Run tests
        run: |
          pytest -q

      - name: Build
        run: |
          python -m build

      - name: Publish (TestPyPI)
        if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish (PyPI)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
