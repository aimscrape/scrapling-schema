options:
  clear:
    remove_tags: ["script", "style"]

fields:
  title:
    css: "article h1"
    text: true
    transform: ["strip"]

  author:
    css: "article .author"
    text: true
    transform:
      - regex_sub: { pattern: "^By\\s+", repl: "" }
      - strip

  published_at:
    css: "article time"
    attr: "datetime"

  paragraphs:
    css: "article .content p"
    list: true
    text: true
    transform: ["strip"]

  keywords:
    css: "article .keywords li"
    list: true
    text: true
    transform: ["strip"]

